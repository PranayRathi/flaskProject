<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Data</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 480px; margin: 3rem auto; padding: 0 1rem; }
        label { display: block; margin: 0.75rem 0 0.25rem; font-weight: 600; }
        input, textarea { width: 100%; padding: 0.5rem; box-sizing: border-box; }
        button { margin-top: 1rem; padding: 0.6rem 1.2rem; cursor: pointer; }
        .error { color: #b00020; background: #fde7ea; padding: 0.75rem; border-radius: 4px; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <h1>Submit Data</h1>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST" action="{{ url_for('form') }}">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" value="{{ request.form.name or '' }}">

        <label for="email">Email</label>
        <input type="email" id="email" name="email" value="{{ request.form.email or '' }}">

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="4">{{ request.form.message or '' }}</textarea>

        <button type="submit">Submit</button>
    </form>
</body>
</html>
