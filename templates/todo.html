<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 480px; margin: 3rem auto; padding: 0 1rem; }
        label { display: block; margin: 0.75rem 0 0.25rem; font-weight: 600; }
        input, textarea { width: 100%; padding: 0.5rem; box-sizing: border-box; }
        button { margin-top: 1rem; padding: 0.6rem 1.2rem; cursor: pointer; }
    </style>
</head>
<body>
    <h1>To-Do</h1>

    <form method="POST" action="/submittodoitem">
        <label for="itemName">Item Name</label>
        <input type="text" id="itemName" name="itemName">

        <label for="itemDescription">Item Description</label>
        <textarea id="itemDescription" name="itemDescription" rows="4"></textarea>

        <label for="itemId">Item ID</label>
        <input type="text" id="itemId" name="itemId">

        <label for="itemUuid">Item UUID</label>
        <input type="text" id="itemUuid" name="itemUuid">

        <label for="itemHash">Item Hash</label>
        <input type="text" id="itemHash" name="itemHash">

        <button type="submit">Add Item</button>
    </form>
</body>
</html>
